name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # الخطوة 1: جلب الكود
      - name: Checkout code
        uses: actions/checkout@v4

      # الخطوة 2: تثبيت Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # الخطوة 3: تثبيت المكتبات
      - name: Install dependencies
        run: pip install pytest

      # الخطوة 4: تشغيل الاختبارات
      - name: Run tests
        run: pytest test_calculator.py -v

      # الخطوة 5: GitLeaks - فحص الـ secrets
      - name: Run GitLeaks Scan
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --source . -v --no-git || true

      # الخطوة 6: placeholder للـ Build
      - name: Build
        run: echo "Building the project..."

      # الخطوة 7: placeholder للـ Deploy
      - name: Deploy
        run: echo "Deploying the project..."
